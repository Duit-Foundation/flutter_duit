name: flutter_duit
description: Server driver UI framework for Flutter. Allows you to update your cool UI without updating the app!
version: 4.4.1
repository: https://github.com/Duit-Foundation/flutter_duit
issue_tracker: https://github.com/Duit-Foundation/flutter_duit/issues
homepage: https://duit.pro/en/
funding:
  - https://boosty.to/duit_foundation

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.27.0"

resolution: workspace

dependencies:
  duit_kernel: ^4.4.1
  flutter:
    sdk: flutter
  http: ^1.6.0
  meta: ^1.15.0
  web: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.3
  mocktail: ^1.0.4
